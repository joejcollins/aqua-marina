---
name: Run All Tests

on:
  push:
    branches: [ main ]

jobs:
  run_python_tests:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/joejcollins/aqua-marina:latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: false
        clean: true

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: 3.11

    - name: Install dependencies
      run: |
        make venv
        make test
...