---
name: Run All Tests

on:
  push:
    branches: [ main ]
    paths:
      - 'tests/**'

jobs:
  run_python_tests:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/joejcollins/aqua-marina:latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: false
        clean: true

    - name: Run tests.
      run: |
        make venv
        make test
...